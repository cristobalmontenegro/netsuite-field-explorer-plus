<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <title>Netsuite Field Explorer Plus</title>

  <link rel="stylesheet" type="text/css"
    href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"
    integrity="sha384-wvfXpqpZZVQGK6TAh5PVlGOfQNHSoD2xbE+QkPxCAFlNEevoEH3Sl0sibVcOQVnN" crossorigin="anonymous" />
  <link rel="stylesheet" type="text/css" href="lib/json-formatter-js/json-formatter-js.min.css" />
  <link rel="stylesheet" type="text/css" href="css/popup.css" />
</head>

<body>
  <header>
    <div id="title">
      <h1>Netsuite Field Explorer Plus</h1>
      <h2>por Cristobal Montenegro (Original by Michoel Chaikin)</h2>
    </div>

    <a href="https://ko-fi.com/cristobalmontenegro" target="_blank" id="support-button">
      <img height="36" style="border:0px;height:36px;" src="https://storage.ko-fi.com/cdn/kofi6.png?v=6" border="0"
        alt="Buy Me a Coffee at ko-fi.com" />
    </a>
  </header>

  <div id="search">
    <input id="searchbox" placeholder="Filtrar campos" autofocus />
    <button id="expand-toggle" title="Expandir/Contraer Todo"><i class="fa fa-expand"></i></button>
    <button id="copy-json" title="Copiar JSON"><i class="fa fa-copy"></i></button>
  </div>

  <div id="container">
    <i class="fa fa-spinner fa-pulse"></i>
    Por favor espera.. cargando registro..
  </div>

  <div id="links" style="visibility: hidden;">
    <span id="records_browser">
      <i class="fa fa-external-link" aria-hidden="true"></i>&nbsp;
      <a href="#" target="_blank">Abrir en Records Browser</a>
    </span>

    <span id="records_catalog">
      <i class="fa fa-external-link" aria-hidden="true"></i>&nbsp;
      <a href="#" target="_blank">Abrir en Records Catalog</a>
    </span>
  </div>

  <script src="lib/x2js/x2js.js"></script>
  <script src="lib/lodash/lodash.min.js"></script>
  <script src="lib/json-formatter-js/json-formatter-js.min.js"></script>
  <script src="js/popup.js"></script>
</body>

</html>
